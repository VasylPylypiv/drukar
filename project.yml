name: Drukar
options:
  bundleIdPrefix: com.vasylpylypiv.inputmethod
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Drukar:
    type: application
    platform: macOS
    sources:
      - path: Drukar
        excludes:
          - "Resources/Assets.xcassets/AppIcon.appiconset"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vasylpylypiv.inputmethod.Drukar
        PRODUCT_NAME: Drukar
        INFOPLIST_FILE: Drukar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Drukar/Resources/Drukar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_STRICT_CONCURRENCY: complete
    resources:
      - path: Drukar/Resources/Assets.xcassets
      - path: Drukar/Resources/drukar-icon.tiff
      - path: Drukar/Resources/drukar-menubar.tiff
      - path: Drukar/Resources/ua_freq.json
      - path: Drukar/Resources/en_freq.json
      - path: Drukar/Resources/words_uk.txt.gz
      - path: Drukar/Resources/words_en.txt.gz
